spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/kkori
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  logging.level:
    org.hibernate.SQL: debug

  config:
    import: classpath:application-secret.yml

gms:
  api-key:
  whisper-url: "https://gms.ssafy.io/gmsapi/api.openai.com/v1/audio/transcriptions"
  gpt-url: "https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions"