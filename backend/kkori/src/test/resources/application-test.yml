spring:
  datasource:
    url: jdbc:h2:mem:kkori-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  logging:
    level:
      org.hibernate.SQL: debug

  config:
    import: classpath:application-secret.yml

gms:
  api-key:
  whisper-url: "https://gms.ssafy.io/gmsapi/api.openai.com/v1/audio/transcriptions"
  gpt-url: "https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions"
